<mat-card>
  <mat-card-header>
    <mat-card-title>Calculate Your Tax</mat-card-title>
    <mat-card-subtitle>2024/2025 tax year</mat-card-subtitle>
  </mat-card-header>

  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Gross Annual Income (ZAR)</mat-label>
        <input matInput type="number" formControlName="grossAnnual" placeholder="e.g. 500000" min="0">
        <mat-error *ngIf="form.get('grossAnnual')?.hasError('required')">Gross annual income is required</mat-error>
        <mat-error *ngIf="form.get('grossAnnual')?.hasError('min')">Income must be zero or more</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Age</mat-label>
        <input matInput type="number" formControlName="age" placeholder="e.g. 35" min="0" max="130">
        <mat-error *ngIf="form.get('age')?.hasError('required')">Age is required</mat-error>
        <mat-error *ngIf="form.get('age')?.hasError('min') || form.get('age')?.hasError('max')">Age must be between 0 and 130</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Medical Aid Members</mat-label>
        <input matInput type="number" formControlName="medicalAidMembers" placeholder="0" min="0" max="20">
        <mat-hint>Include yourself and all dependants on your medical aid (0 if none)</mat-hint>
        <mat-error *ngIf="form.get('medicalAidMembers')?.hasError('min') || form.get('medicalAidMembers')?.hasError('max')">Must be between 0 and 20</mat-error>
      </mat-form-field>

      <div class="actions">
        <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid || loading">
          <span *ngIf="!loading">Calculate</span>
          <mat-spinner *ngIf="loading" diameter="20"></mat-spinner>
        </button>
      </div>

      <mat-error *ngIf="error" class="api-error">{{ error }}</mat-error>

    </form>
  </mat-card-content>
</mat-card>
